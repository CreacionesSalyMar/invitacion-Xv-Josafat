<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XV Jehu Josafat</title>

<style>
body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(180deg,#00142f,#061b46,#000814);
  color:white;
  font-family:Georgia, serif;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  overflow:hidden;
}

.container{
  padding:30px;
}

.disco{
  width:100px;
  height:100px;
  margin:auto;
  border-radius:50%;
  background:radial-gradient(circle,#fff,#bfc7d5,#3c4d70);
  box-shadow:0 0 35px silver;
  animation:girar 5s linear infinite;
}

@keyframes girar{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

h1{
  font-size:38px;
  color:#e8e8e8;
  letter-spacing:2px;
}

h2{
  color:#d6d9df;
  font-size:28px;
}

p{
  font-size:20px;
  line-height:1.6;
}

.fecha{
  color:#c0c0c0;
  font-size:24px;
}

.brillo{
  color:#ffffff;
  text-shadow:0 0 15px silver;
}
</style>
</head>

<body>

<div class="container">

<div class="disco"></div>

<h1>✨ Una noche inolvidable está por comenzar ✨</h1>

<p>
Con mucha alegría te invito a celebrar conmigo este momento tan especial.
</p>

<h2 class="brillo">Mis XV años</h2>

<h2>Jehu Josafat Lozada Salvador</h2>

<p class="fecha">29 de agosto de 2026</p>

<p>
Será un honor compartir esta celebración contigo.
</p>

</div>

</body>
</html>
